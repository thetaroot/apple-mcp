services:
  apple-mcp:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "8080:8080"
    volumes:
      - apple-mcp-session:/data/pyicloud
    environment:
      # Required
      - APPLE_ID=${APPLE_ID}
      - APPLE_APP_SPECIFIC_PASSWORD=${APPLE_APP_SPECIFIC_PASSWORD}

      # Session persistence (stores iCloud cookies across restarts)
      - APPLE_COOKIE_DIRECTORY=/data/pyicloud

      # Service toggles (optional)
      - APPLE_ENABLE_CALENDAR=${APPLE_ENABLE_CALENDAR:-true}
      - APPLE_ENABLE_REMINDERS=${APPLE_ENABLE_REMINDERS:-true}
      - APPLE_ENABLE_MAIL=${APPLE_ENABLE_MAIL:-true}

      # Scope configuration (optional — empty = allow all)
      - APPLE_CALENDAR_NAMES=${APPLE_CALENDAR_NAMES:-}
      - APPLE_CALENDAR_EXCLUDE=${APPLE_CALENDAR_EXCLUDE:-}
      - APPLE_CALENDAR_MODE=${APPLE_CALENDAR_MODE:-read_write}
      - APPLE_REMINDER_LISTS=${APPLE_REMINDER_LISTS:-}
      - APPLE_REMINDER_EXCLUDE=${APPLE_REMINDER_EXCLUDE:-}
      - APPLE_REMINDER_MODE=${APPLE_REMINDER_MODE:-read_write}
      - APPLE_MAIL_FOLDERS=${APPLE_MAIL_FOLDERS:-}
      - APPLE_MAIL_EXCLUDE_FOLDERS=${APPLE_MAIL_EXCLUDE_FOLDERS:-}
      - APPLE_MAIL_MODE=${APPLE_MAIL_MODE:-read_write}

      # Per-service passwords (optional — overrides shared password)
      # - APPLE_CALENDAR_PASSWORD=${APPLE_CALENDAR_PASSWORD}
      # - APPLE_REMINDERS_PASSWORD=${APPLE_REMINDERS_PASSWORD}
      # - APPLE_MAIL_PASSWORD=${APPLE_MAIL_PASSWORD}

      # External mail accounts (optional JSON array)
      # APPLE_MAIL_ACCOUNTS='[{"type":"external","email":"luis@company.com","imap_host":"mail.company.com","imap_port":993,"smtp_host":"mail.company.com","smtp_port":587,"password_env":"MAIL_PWD_WORK","folders_allow":["INBOX","Sent"]}]'
      # MAIL_PWD_WORK=${MAIL_PWD_WORK}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 3

volumes:
  apple-mcp-session:
